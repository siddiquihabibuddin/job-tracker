spring:
  application:
    name: ai-service
  config:
    import: "optional:configserver:http://config-server:8888"

server:
  port: 8085

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-characters-long}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.jobtracker: INFO
    org.springframework.security: WARN
