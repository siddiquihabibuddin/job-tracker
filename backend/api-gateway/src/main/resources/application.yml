spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://config-server:8888"
  cloud:
    gateway:
      httpclient:
        resolver:
          address: 127.0.0.11
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods: [GET, POST, PATCH, DELETE, OPTIONS]
                allowedHeaders: [Authorization, Content-Type, Idempotency-Key]
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: auth-service
              uri: http://applications-service:8081
              predicates:
                - Path=/v1/auth/**
            - id: applications-service
              uri: http://applications-service:8081
              predicates:
                - Path=/v1/applications/**
            - id: stats-service
              uri: http://stats-service:8082
              predicates:
                - Path=/v1/stats/**
            - id: alerts-service
              uri: http://job-alerts-service:8084
              predicates:
                - Path=/v1/alerts/**
            - id: ai-service
              uri: http://ai-service:8085
              predicates:
                - Path=/v1/ai/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
