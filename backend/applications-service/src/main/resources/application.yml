spring:
  application:
    name: applications-service
  config:
    import: "optional:configserver:http://config-server:8888"

  datasource:
    url: jdbc:postgresql://localhost:5432/jt_apps
    username: ${DB_USER:jt}
    password: ${DB_PASSWORD:jtpass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: "false"

server:
  port: 8081

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-characters-long}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.jobtracker: INFO
    org.springframework.security: WARN

csv:
  import:
    folder: ${CSV_IMPORT_FOLDER:/app/csv-imports}

# allow local dev UI
cors:
  allowed-origins: "http://localhost:5173"
