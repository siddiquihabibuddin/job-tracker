spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jt_stats
    username: ${DB_USER:jt}
    password: ${DB_PASSWORD:jtpass}

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: stats-service
      auto-offset-reset: earliest

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
