spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jt_stats
    username: ${DB_USER:jt}
    password: ${DB_PASSWORD:jtpass}

  data:
    redis:
      host: redis
      port: 6379
      connect-timeout: 2000
      timeout: 1000

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: stats-service
      auto-offset-reset: earliest

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
