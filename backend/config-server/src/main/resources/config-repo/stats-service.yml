spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jt_stats
    username: ${DB_USER:jt}
    password: ${DB_PASSWORD:jtpass}
  data:
    redis:
      host: redis
      port: 6379
      connect-timeout: 2000
      timeout: 1000

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

cors:
  enabled: false
  allowed-origins: "http://localhost:5173"

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:qwen2.5:1.5b}
