spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jt_stats
    username: ${DB_USER:jt}
    password: ${DB_PASSWORD:jtpass}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

cors:
  enabled: false
  allowed-origins: "http://localhost:5173"
