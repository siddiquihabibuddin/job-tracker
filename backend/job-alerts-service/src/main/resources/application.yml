spring:
  application:
    name: job-alerts-service
  config:
    import: "optional:configserver:http://config-server:8888"
  datasource:
    url: jdbc:postgresql://localhost:5432/jt_alerts
    username: ${DB_USER:jt}
    password: ${DB_PASSWORD:jtpass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8084

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-please-use-at-least-32-chars}

job-alerts:
  poller:
    enabled: true
    interval-ms: 1800000
  http-client:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
